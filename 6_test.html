<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC - បញ្ជីផលិតសម្ភារៈ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Taprom&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ThyrithSor/momentkh@3.0.3/momentkh.js"></script>
    
    <style>
        :root { --primary: #059669; --secondary: #10b981; }
        
        body { font-family: 'Battambang', cursive; background: #f0fdf4; min-height: 100vh; margin: 0; color: #1e293b; }
        .kh-moul { font-family: 'Moul', cursive; }
        .font-taprom { font-family: 'Taprom', cursive; }
        .text-shadow-custom { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .pdf-exporting .text-shadow-custom { text-shadow: none !important; }

        /* Background Animation */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 20%, #f0fdf4 0%, transparent 40%), radial-gradient(circle at 90% 80%, #ecfdf5 0%, transparent 40%), radial-gradient(circle at 50% 50%, #f0f9ff 0%, transparent 50%); animation: moveBg 20s infinite alternate ease-in-out; }
        @keyframes moveBg { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Form Control */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-field {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            outline: none;
            background: #f8fafc;
            font-family: 'Battambang', cursive;
            transition: all 0.2s;
            font-weight: 700;
        }
        .input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        /* Print Container & A4 Styling */
        .a4-page {
            background: white;
            width: 210mm;
            height: 297mm; /* Strict height to prevent overflow/blank pages */
            margin: 0 auto 2rem auto;
            padding: 15mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            position: relative;
            box-sizing: border-box;
            color: black;
            overflow: hidden; /* Ensure content fits inside the page */
            page-break-after: always;
        }
        
        .cover-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20mm;
        }
        
        .cover-border {
            position: absolute;
            top: 15mm;
            bottom: 15mm;
            left: 15mm;
            right: 15mm;
            border: 4px solid #059669;
            outline: 2px solid #059669;
            outline-offset: 4px;
            pointer-events: none;
        }

        .report-table { width: 100%; border-collapse: collapse; font-size: 11pt; margin-top: 20px; table-layout: fixed; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 6px 8px; text-align: center; vertical-align: middle; overflow: hidden; height: 35px; }
        .report-table th { background-color: #f0fdf4 !important; font-family: 'Battambang', cursive; font-weight: bold; font-size: 11pt; }
        .report-table td.text-left { text-align: left; }
        
        .signature-container { width: 100%; margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; }
        .sig-col-left { text-align: center; }
        .sig-col-right { text-align: center; }
        .teacher-name-final { font-family: 'Moul', cursive; font-size: 11.5pt; margin-top: 5px; display: block; text-align: center; position: relative; z-index: 10; }
        .lunar-date { font-size: 11pt; margin-bottom: 2px; white-space: nowrap; }
        .solar-date { font-size: 11pt; font-weight: normal; margin-bottom: 8px; }
        .role-title { font-family: 'Moul', cursive; font-size: 12pt; position: relative; z-index: 10;}
        
        /* ស្ទាយថ្មីសម្រាប់ប្រអប់រូបភាពហត្ថលេខាដែលអាចត្រួតស៊ីគ្នាបាន */
        .sig-image-box { height: 75px; margin-top: 10px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 5; }
        .sig-image-box img { max-height: 100%; max-width: 160px; object-fit: contain; mix-blend-mode: multiply; pointer-events: none; }

        /* Native Print Adjustments */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white !important; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            #printAreaWrapper { display: block !important; padding: 0; background: white; }
            .preview-mode { background: white !important; padding: 0 !important; }
            
            .a4-page { 
                width: 210mm !important;
                height: 297mm !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 15mm !important;
                page-break-after: always;
                page-break-inside: avoid;
            }
            .text-shadow-custom { text-shadow: none !important; }
            .report-table th { background-color: #f0fdf4 !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
            .bg-animate { display: none; }
        }

        /* html2pdf specific zeroing */
        .pdf-exporting { background: white !important; }
        .pdf-exporting .a4-page {
            margin: 0 !important;
            box-shadow: none !important;
            border: none !important;
            border-radius: 0 !important;
            transform: none !important;
            height: 296mm !important; /* Slightly below 297mm to prevent bleeding to next page */
            max-height: 296mm !important;
            overflow: hidden !important;
            page-break-after: always !important;
            page-break-inside: avoid !important;
        }

        .preview-mode { background: #64748b; padding-top: 2rem; padding-bottom: 2rem; }
    </style>
</head>
<body spellcheck="false">

    <div class="bg-animate no-print"></div>

    <!-- Main Screen -->
    <div id="mainScreen" class="min-h-screen flex flex-col pt-6 px-4 no-print relative">
        <div class="max-w-6xl mx-auto w-full">
            
            <!-- Form & Management Section -->
            <div class="glass-card p-6 md:p-8 mb-8 border-t border-l border-white/80">
                <div class="flex items-center gap-3 mb-6 border-b pb-4 relative">
                    <div class="p-3 bg-emerald-100 rounded-full text-emerald-600">
                        <i data-lucide="palette" class="w-6 h-6"></i>
                    </div>
                    <h1 class="kh-moul text-xl md:text-2xl text-emerald-700">សៀវភៅបញ្ជីផលិតសម្ភារៈ</h1>
                    
                    <!-- Toggle Signature Box Button -->
                    <button type="button" onclick="toggleSignatureSettings()" class="ml-auto flex items-center gap-2 px-4 py-2.5 bg-emerald-50 text-emerald-700 rounded-xl hover:bg-emerald-100 transition border border-emerald-200 shadow-sm font-bold text-sm" title="កំណត់អ្នកចុះហត្ថលេខា">
                        <i data-lucide="pen-tool" class="w-4 h-4"></i> <span class="hidden sm:inline">ហត្ថលេខា</span>
                    </button>
                </div>

                <!-- ផ្នែកកំណត់ហត្ថលេខាសម្រាប់ការបោះពុម្ព (លាក់ជាលំនាំដើម) -->
                <div id="signatureSettingsBox" class="hidden bg-emerald-50/60 border border-emerald-100 p-5 md:p-6 rounded-2xl mb-8 shadow-sm transition-all duration-300">
                    <div class="flex items-center justify-between mb-5">
                        <h4 class="text-sm font-bold text-emerald-800 flex items-center gap-2">
                            <i data-lucide="pen-tool" class="w-5 h-5"></i> កំណត់អ្នកចុះហត្ថលេខាសម្រាប់ការបោះពុម្ព
                        </h4>
                        <button type="button" onclick="toggleSignatureSettings()" class="text-slate-400 hover:text-slate-600 transition p-1">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- នាយកសាលា -->
                        <div class="space-y-4 bg-white p-5 rounded-xl border border-emerald-50 shadow-sm">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">ឈ្មោះនាយកសាលា</label>
                                <input type="text" id="managerNameInput" placeholder="វាយបញ្ចូលឈ្មោះ..." class="input-field py-2.5 px-4 text-sm" onchange="updateSignatures()">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">រូបភាពហត្ថលេខា / ត្រា (បើមាន)</label>
                                <div class="flex flex-col xl:flex-row items-start xl:items-center gap-3">
                                    <input type="file" id="managerSignatureInput" accept="image/*" class="text-xs text-slate-500 file:cursor-pointer file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 transition-colors w-full" onchange="handleSignatureUpload('manager')">
                                    
                                    <div class="flex items-center gap-2 flex-shrink-0 w-full sm:w-auto justify-between sm:justify-start">
                                        <div class="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg p-1">
                                            <button type="button" onclick="zoomSignature('manager', -0.1)" class="p-1.5 text-slate-500 hover:text-emerald-600 hover:bg-emerald-50 rounded-md transition-colors" title="បង្រួមទំហំ (Zoom Out)"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                                            
                                            <div id="managerSigPreview" class="h-10 w-16 flex items-center justify-center overflow-hidden bg-white border border-dashed border-slate-200 rounded">
                                                <!-- Preview will be injected here -->
                                            </div>
                                            
                                            <button type="button" onclick="zoomSignature('manager', 0.1)" class="p-1.5 text-slate-500 hover:text-emerald-600 hover:bg-emerald-50 rounded-md transition-colors" title="ពង្រីកទំហំ (Zoom In)"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
                                        </div>
                                        
                                        <button type="button" onclick="removeSignature('manager')" class="text-rose-400 hover:text-rose-600 p-2 rounded-lg hover:bg-rose-50 border border-transparent hover:border-rose-100 transition-colors" title="លុបរូបភាព">
                                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- គ្រូបន្ទុកថ្នាក់ -->
                        <div class="space-y-4 bg-white p-5 rounded-xl border border-emerald-50 shadow-sm">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">ឈ្មោះគ្រូបន្ទុកថ្នាក់</label>
                                <input type="text" id="teacherNameInput" placeholder="វាយបញ្ចូលឈ្មោះ..." class="input-field py-2.5 px-4 text-sm" onchange="updateSignatures()">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">រូបភាពហត្ថលេខា (បើមាន)</label>
                                <div class="flex flex-col xl:flex-row items-start xl:items-center gap-3">
                                    <input type="file" id="teacherSignatureInput" accept="image/*" class="text-xs text-slate-500 file:cursor-pointer file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 transition-colors w-full" onchange="handleSignatureUpload('teacher')">
                                    
                                    <div class="flex items-center gap-2 flex-shrink-0 w-full sm:w-auto justify-between sm:justify-start">
                                        <div class="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg p-1">
                                            <button type="button" onclick="zoomSignature('teacher', -0.1)" class="p-1.5 text-slate-500 hover:text-emerald-600 hover:bg-emerald-50 rounded-md transition-colors" title="បង្រួមទំហំ (Zoom Out)"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                                            
                                            <div id="teacherSigPreview" class="h-10 w-16 flex items-center justify-center overflow-hidden bg-white border border-dashed border-slate-200 rounded">
                                                <!-- Preview will be injected here -->
                                            </div>
                                            
                                            <button type="button" onclick="zoomSignature('teacher', 0.1)" class="p-1.5 text-slate-500 hover:text-emerald-600 hover:bg-emerald-50 rounded-md transition-colors" title="ពង្រីកទំហំ (Zoom In)"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
                                        </div>
                                        
                                        <button type="button" onclick="removeSignature('teacher')" class="text-rose-400 hover:text-rose-600 p-2 rounded-lg hover:bg-rose-50 border border-transparent hover:border-rose-100 transition-colors" title="លុបរូបភាព">
                                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Input Form -->
                <div class="bg-emerald-50/50 border border-emerald-100 p-5 rounded-2xl mb-8">
                    <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2" id="formTitle">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-emerald-600"></i> កត់ត្រាការផលិតថ្មី
                    </h3>
                    <form id="productionForm" class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                        <input type="hidden" id="editId" value="">
                        
                        <div class="md:col-span-4">
                            <label class="block text-sm font-bold text-gray-600 mb-1">ឈ្មោះសម្ភារៈ <span class="text-red-500">*</span></label>
                            <input type="text" id="prodName" list="nameOptions" required placeholder="ឧ. បណ្ណអក្ខរក្រម..." class="input-field">
                            <datalist id="nameOptions">
                                <option value="បណ្ណអក្ខរក្រម"></option>
                                <option value="បណ្ណរូបភាព"></option>
                                <option value="កេសរកង"></option>
                                <option value="បន្ទាត់លេខ"></option>
                                <option value="តារាងតម្លែតាមខ្ទង់"></option>
                            </datalist>
                        </div>
                        
                        <div class="md:col-span-3">
                            <label class="block text-sm font-bold text-gray-600 mb-1">មុខវិជ្ជា <span class="text-red-500">*</span></label>
                            <input type="text" id="prodSubject" list="subjectOptions" required placeholder="ជ្រើសរើសមុខវិជ្ជា..." class="input-field">
                            <datalist id="subjectOptions">
                                <option value="ភាសាខ្មែរ"></option>
                                <option value="គណិតវិទ្យា"></option>
                                <option value="សិក្សាសង្គម"></option>
                                <option value="វិទ្យាសាស្ត្រ"></option>
                            </datalist>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-gray-600 mb-1">ចំនួន <span class="text-red-500">*</span></label>
                            <input type="number" id="prodQty" required min="1" placeholder="ឧ. ១០" class="input-field text-center">
                        </div>
                        
                        <div class="md:col-span-3">
                            <label class="block text-sm font-bold text-gray-600 mb-1">ថ្ងៃខែឆ្នាំផលិត <span class="text-red-500">*</span></label>
                            <input type="date" id="prodDate" required class="input-field">
                        </div>
                        
                        <div class="md:col-span-12 flex justify-end gap-3 mt-2">
                            <button type="button" id="btnCancel" onclick="resetForm()" class="hidden bg-gray-400 hover:bg-gray-500 text-white font-bold py-2.5 px-6 rounded-xl transition shadow">
                                បោះបង់
                            </button>
                            <button type="submit" id="btnSave" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-8 rounded-xl transition shadow flex items-center gap-2">
                                <i data-lucide="save" class="w-4 h-4"></i> រក្សាទុក
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Controls -->
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-700 flex items-center gap-2">
                        <i data-lucide="list" class="w-5 h-5 text-emerald-600"></i> បញ្ជីប្រវត្តិផលិតសម្ភារៈ (<span id="totalItemsCount">0</span>)
                    </h3>
                    <button onclick="previewPDF()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl font-bold transition shadow-md flex items-center gap-2 text-sm">
                        <i data-lucide="printer" class="w-4 h-4"></i> បោះពុម្ព PDF
                    </button>
                </div>

                <!-- Data Table -->
                <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-700 font-bold border-b">
                            <tr>
                                <th class="p-3 text-center w-16">ល.រ</th>
                                <th class="p-3">ឈ្មោះសម្ភារៈ</th>
                                <th class="p-3 text-center w-32">មុខវិជ្ជា</th>
                                <th class="p-3 text-center w-24">ចំនួន</th>
                                <th class="p-3 text-center w-40">ថ្ងៃខែឆ្នាំផលិត</th>
                                <th class="p-3 text-center w-32">គ្រប់គ្រង</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-100">
                            <!-- Data injected by JS -->
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <!-- Print Preview Wrapper -->
    <div id="printAreaWrapper" class="hidden">
        
        <div class="fixed top-4 right-4 flex flex-col gap-3 z-50 no-print">
            <button onclick="downloadPDF()" class="bg-red-600 text-white p-3.5 rounded-full shadow-xl hover:bg-red-700 transition flex justify-center items-center" title="ទាញយក PDF"><i data-lucide="download" class="w-5 h-5"></i></button>
            <button onclick="window.print()" class="bg-emerald-600 text-white p-3.5 rounded-full shadow-xl hover:bg-emerald-700 transition flex justify-center items-center" title="បោះពុម្ភ"><i data-lucide="printer" class="w-5 h-5"></i></button>
            <button onclick="closePreview()" class="bg-slate-600 text-white p-3.5 rounded-full shadow-xl hover:bg-slate-700 transition flex justify-center items-center" title="បិទ"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div id="printContainer">
            <!-- Cover Page -->
            <div class="a4-page cover-page relative" id="printCoverPage">
                <div class="cover-border"></div>
                <div class="text-center w-full mt-4">
                    <h1 class="kh-moul text-xl mb-2">ព្រះរាជាណាចក្រកម្ពុជា</h1>
                    <h2 class="kh-moul text-lg">ជាតិ សាសនា ព្រះមហាក្សត្រ</h2>
                    <img src="https://lh3.googleusercontent.com/d/1BnGzoisjHxGRiMbsrP-rZ1F9zvSfdtAh" alt="divider" class="h-[16px] w-auto mx-auto mt-3 mb-8" crossorigin="anonymous">
                </div>
                <div class="w-full text-left mt-4 pl-8 font-bold">
                    <p class="kh-moul text-base mb-3" id="cover_org_1"></p>
                    <p class="kh-moul text-base mb-3" id="cover_org_2"></p>
                    <p class="kh-moul text-base mb-3" id="cover_school"></p>
                </div>
                <div class="flex-1 flex flex-col justify-center items-center w-full space-y-10 mt-10">
                    <h1 class="kh-moul text-6xl text-emerald-600 text-shadow-custom">សៀវភៅ</h1>
                    <h2 class="kh-moul text-4xl text-red-500 text-shadow-custom leading-normal text-center w-full px-8">បញ្ជីផលិតសម្ភារៈ</h2>
                    <h3 class="kh-moul text-4xl text-blue-600 text-shadow-custom" id="cover_class"></h3>
                </div>
                <div class="w-full text-center mt-auto mb-8 space-y-4">
                    <p class="kh-moul text-3xl" id="cover_teacher"></p>
                    <p class="kh-moul text-3xl">ឆ្នាំសិក្សា <span id="cover_year">...</span></p>
                </div>
            </div>

            <!-- Dynamic Data Pages injected here -->
            <div id="dynamicPagesContainer"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'ptec_production_data';
        let prodItems = [];
        let classConfig = {};

        const khDigits = ['០', '១', '២', '៣', '៤', '៥', '៦', '៧', '៨', '៩'];
        const khMonths = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];
        
        function toKhmerNum(num) { 
            return num.toString().split('').map(d => khDigits[d] || d).join(''); 
        }

        function formatDateKhmer(dateString) {
            if(!dateString) return '';
            const d = new Date(dateString);
            return `${toKhmerNum(d.getDate().toString().padStart(2, '0'))}-${khMonths[d.getMonth()]}-${toKhmerNum(d.getFullYear())}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadClassConfig();
            loadData();
            document.getElementById('prodDate').valueAsDate = new Date();
        });

        // Toggle Signature Box Visibility
        function toggleSignatureSettings() {
            const box = document.getElementById('signatureSettingsBox');
            box.classList.toggle('hidden');
        }

        // Configuration and Signature management
        function loadClassConfig() {
            const defaultSettings = {
                unit1: "មន្ទីរអប់រំ យុវជន និងកីឡា", unit2: "ការិយាល័យអប់រំ យុវជន និងកីឡា",
                className: "................", schoolName: "................",
                teacherName: "ឈ្មោះគ្រូ", managerRole: "នាយកសាលា", managerName: "",
                managerSignature: null, managerSigScale: 1.0,
                teacherSignature: null, teacherSigScale: 1.0,
                location: "................", academicYear: "២០២៤-២០២៥"
            };
            try {
                classConfig = JSON.parse(localStorage.getItem('app_settings')) || defaultSettings;
                if (typeof classConfig.managerSigScale !== 'number') classConfig.managerSigScale = 1.0;
                if (typeof classConfig.teacherSigScale !== 'number') classConfig.teacherSigScale = 1.0;
            } catch(e) { classConfig = defaultSettings; }

            const managerInput = document.getElementById('managerNameInput');
            const teacherInput = document.getElementById('teacherNameInput');
            if(managerInput) managerInput.value = classConfig.managerName || '';
            if(teacherInput) teacherInput.value = classConfig.teacherName || '';

            renderSignaturePreview('manager');
            renderSignaturePreview('teacher');
        }

        function updateSignatures() {
            classConfig.managerName = document.getElementById('managerNameInput').value;
            classConfig.teacherName = document.getElementById('teacherNameInput').value;
            localStorage.setItem('app_settings', JSON.stringify(classConfig));
        }

        function handleSignatureUpload(type) {
            const input = document.getElementById(type + 'SignatureInput');
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    if (type === 'manager') {
                        classConfig.managerSignature = base64;
                        classConfig.managerSigScale = 1.0;
                    } else {
                        classConfig.teacherSignature = base64;
                        classConfig.teacherSigScale = 1.0; 
                    }
                    localStorage.setItem('app_settings', JSON.stringify(classConfig));
                    renderSignaturePreview(type);
                };
                reader.readAsDataURL(file);
            }
        }

        function removeSignature(type) {
            if (type === 'manager') {
                classConfig.managerSignature = null;
            } else {
                classConfig.teacherSignature = null;
            }
            localStorage.setItem('app_settings', JSON.stringify(classConfig));
            document.getElementById(type + 'SignatureInput').value = ''; 
            renderSignaturePreview(type);
        }

        function zoomSignature(type, delta) {
            const scaleKey = type + 'SigScale';
            if (typeof classConfig[scaleKey] !== 'number') {
                classConfig[scaleKey] = 1.0;
            }
            
            classConfig[scaleKey] += delta;
            classConfig[scaleKey] = Math.max(0.2, Math.min(3.0, classConfig[scaleKey]));
            
            localStorage.setItem('app_settings', JSON.stringify(classConfig));
            renderSignaturePreview(type);
        }

        function renderSignaturePreview(type) {
            const previewDiv = document.getElementById(type + 'SigPreview');
            const sigData = type === 'manager' ? classConfig.managerSignature : classConfig.teacherSignature;
            const scaleKey = type + 'SigScale';
            const scale = classConfig[scaleKey] !== undefined ? classConfig[scaleKey] : 1.0;
            
            if (sigData) {
                previewDiv.innerHTML = `<img src="${sigData}" style="transform: scale(${scale}); transform-origin: center center;" class="h-full w-full object-contain transition-transform duration-200">`;
            } else {
                previewDiv.innerHTML = `<span class="text-[10px] text-slate-400">គ្មានរូបភាព</span>`;
            }
        }

        // Dashboard Integration
        window.saveData = function() {
            const form = document.getElementById('productionForm');
            if (form.reportValidity()) {
                const btn = document.getElementById('btnSave');
                btn.click();
            }
        };

        function loadData() {
            prodItems = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            renderTable();
        }

        function commitData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(prodItems));
            renderTable();
        }

        document.getElementById('productionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const idInput = document.getElementById('editId').value;
            const name = document.getElementById('prodName').value.trim();
            const subject = document.getElementById('prodSubject').value.trim();
            const qty = parseInt(document.getElementById('prodQty').value) || 0;
            const date = document.getElementById('prodDate').value;

            if (idInput) {
                const idx = prodItems.findIndex(i => i.id == idInput);
                if (idx !== -1) prodItems[idx] = { ...prodItems[idx], name, subject, qty, date };
            } else {
                prodItems.push({ id: Date.now(), name, subject, qty, date });
            }
            commitData();
            resetForm();
        });

        function editItem(id) {
            const item = prodItems.find(i => i.id === id);
            if (!item) return;
            document.getElementById('editId').value = item.id;
            document.getElementById('prodName').value = item.name;
            document.getElementById('prodSubject').value = item.subject;
            document.getElementById('prodQty').value = item.qty;
            document.getElementById('prodDate').value = item.date;

            document.getElementById('formTitle').innerHTML = '<i data-lucide="edit-3" class="w-5 h-5 text-yellow-600"></i> កែប្រែព័ត៌មាន';
            document.getElementById('btnSave').innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> យល់ព្រម';
            document.getElementById('btnCancel').classList.remove('hidden');
            lucide.createIcons();
            document.getElementById('prodName').focus();
        }

        function deleteItem(id) {
            if (confirm("តើអ្នកពិតជាចង់លុបទិន្នន័យនេះមែនទេ?")) {
                prodItems = prodItems.filter(i => i.id !== id);
                commitData();
            }
        }

        function resetForm() {
            document.getElementById('productionForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('prodDate').valueAsDate = new Date();
            document.getElementById('formTitle').innerHTML = '<i data-lucide="plus-circle" class="w-5 h-5 text-emerald-600"></i> កត់ត្រាការផលិតថ្មី';
            document.getElementById('btnSave').innerHTML = '<i data-lucide="save" class="w-4 h-4"></i> រក្សាទុក';
            document.getElementById('btnCancel').classList.add('hidden');
            lucide.createIcons();
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            document.getElementById('totalItemsCount').innerText = toKhmerNum(prodItems.length);
            if (prodItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-400 font-bold italic">មិនទាន់មានទិន្នន័យផលិតនៅឡើយទេ</td></tr>`;
                return;
            }
            const sorted = [...prodItems].sort((a,b) => new Date(b.date) - new Date(a.date));
            tbody.innerHTML = sorted.map((item, idx) => `
                <tr class="hover:bg-emerald-50/30 transition">
                    <td class="p-3 text-center font-bold text-gray-500">${toKhmerNum(idx + 1)}</td>
                    <td class="p-3 font-bold text-emerald-700">${item.name}</td>
                    <td class="p-3 text-center text-gray-600">${item.subject}</td>
                    <td class="p-3 text-center font-bold">${toKhmerNum(item.qty)}</td>
                    <td class="p-3 text-center text-gray-500">${formatDateKhmer(item.date)}</td>
                    <td class="p-3 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editItem(${item.id})" class="p-2 bg-yellow-50 text-yellow-600 rounded-lg hover:bg-yellow-100 transition"><i data-lucide="edit" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem(${item.id})" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function previewPDF() {
            updateSignatures(); // Ensure settings are fresh
            loadClassConfig();
            const today = new Date();
            
            // Clean up className string to prevent "ថ្នាក់ទី ថ្នាក់ទី" duplication
            let rawClass = classConfig.className || '...';
            let cleanClass = rawClass.replace(/ថ្នាក់ទី\s*/g, '').trim();
            
            // Populate Cover Elements
            document.getElementById('cover_org_1').textContent = classConfig.unit1 || '';
            document.getElementById('cover_org_2').textContent = classConfig.unit2 || '';
            document.getElementById('cover_school').textContent = classConfig.schoolName || '';
            document.getElementById('cover_class').textContent = rawClass.includes('ថ្នាក់ទី') ? rawClass : (rawClass !== '...' ? `ថ្នាក់ទី ${rawClass}` : 'ថ្នាក់ទី...');
            document.getElementById('cover_teacher').textContent = classConfig.teacherName || '';
            document.getElementById('cover_year').textContent = classConfig.academicYear || '២០២៤-២០២៥';

            // Generate Date Strings
            let lunarStr = "ថ្ងៃ................ខែ..........ឆ្នាំ..........ព.ស.២៥៦...";
            if (typeof momentkh !== 'undefined') {
                try { lunarStr = momentkh.format(momentkh.fromDate(today)).replace('ពុទ្ធសករាជ', 'ព.ស.'); } catch (e) {}
            }
            const loc = classConfig.location || '....................';
            const solarStr = `${loc}, ថ្ងៃទី${toKhmerNum(today.getDate().toString().padStart(2, '0'))} ខែ${khMonths[today.getMonth()]} ឆ្នាំ${toKhmerNum(today.getFullYear())}`;

            // Manual Pagination Setup
            const sorted = [...prodItems].sort((a,b) => new Date(a.date) - new Date(b.date));
            const ROWS_PER_PAGE = 15; // Safe maximum to prevent overflow across A4 height
            const minimumRows = 15;
            const totalItems = Math.max(minimumRows, sorted.length);
            const totalPages = Math.ceil(totalItems / ROWS_PER_PAGE);

            let dynamicPagesHTML = '';

            // Generate Pages Dynamically
            for(let p = 0; p < totalPages; p++) {
                const startIdx = p * ROWS_PER_PAGE;
                const endIdx = startIdx + ROWS_PER_PAGE;
                let rowsHTML = '';

                // Build Rows for this page
                for(let i = startIdx; i < endIdx; i++) {
                    if (i < sorted.length) {
                        const item = sorted[i];
                        rowsHTML += `<tr>
                            <td>${toKhmerNum(i + 1)}</td>
                            <td class="text-left font-bold pl-2">${item.name}</td>
                            <td>${item.subject}</td>
                            <td class="font-bold">${toKhmerNum(item.qty)}</td>
                            <td>${formatDateKhmer(item.date)}</td>
                        </tr>`;
                    } else if (i < totalItems || (p === totalPages - 1 && i < endIdx)) {
                        // Empty Filler Rows
                        rowsHTML += `<tr>
                            <td>${toKhmerNum(i + 1)}</td>
                            <td></td><td></td><td></td><td></td>
                        </tr>`;
                    }
                }

                const isLastPage = (p === totalPages - 1);

                // Page Structure
                const pageHeader = `
                    <div class="text-center w-full mb-6">
                        <h3 class="kh-moul text-[13pt] mb-1">ព្រះរាជាណាចក្រកម្ពុជា</h3>
                        <h3 class="kh-moul text-[13pt] mb-1">ជាតិ សាសនា ព្រះមហាក្សត្រ</h3>
                        <img src="https://lh3.googleusercontent.com/d/1BnGzoisjHxGRiMbsrP-rZ1F9zvSfdtAh" class="h-[12pt] w-auto mx-auto mt-2" crossorigin="anonymous">
                    </div>
                    <div class="w-full text-[11pt] mb-4 font-bold">
                        <p>${classConfig.unit1 || ''}</p>
                        <p>${classConfig.unit2 || ''}</p>
                        <p>${classConfig.schoolName || ''}</p>
                    </div>
                    <h2 class="kh-moul text-center text-[14pt] mb-2">បញ្ជីផលិតសម្ភារៈ</h2>
                    <p class="text-center font-bold text-[11pt] mb-4">ប្រចាំថ្នាក់ទី ${cleanClass || '...'} សិក្សាឆ្នាំ ${classConfig.academicYear || '...'}</p>
                `;

                const pageTable = `
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th class="w-[8%]">ល.រ</th>
                                <th class="w-[40%]">ឈ្មោះសម្ភារៈ</th>
                                <th class="w-[20%]">មុខវិជ្ជា</th>
                                <th class="w-[12%]">ចំនួន</th>
                                <th class="w-[20%]">ថ្ងៃខែឆ្នាំផលិត</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHTML}</tbody>
                    </table>
                `;

                // Footer with Signatures Images Support
                let pageFooter = '';
                if (isLastPage) {
                    let managerScale = classConfig.managerSigScale !== undefined ? classConfig.managerSigScale : 1.0;
                    let teacherScale = classConfig.teacherSigScale !== undefined ? classConfig.teacherSigScale : 1.0;
                    
                    pageFooter = `
                        <div class="signature-container">
                            <div class="sig-col-left">
                                <p class="text-[11pt] mb-2 invisible">.</p>
                                <p class="text-[11pt] mb-2">បានឃើញ និងឯកភាព</p>
                                <p class="role-title">${classConfig.managerRole || 'នាយកសាលា'}</p>
                                <div class="sig-image-box" style="margin-left: 2cm;">${classConfig.managerSignature ? `<img src="${classConfig.managerSignature}" style="transform: scale(${managerScale}); transform-origin: center center;">` : ''}</div>
                                <p class="teacher-name-final" style="padding-left: 3cm;">${classConfig.managerName || ''}</p>
                            </div>
                            <div class="sig-col-right">
                                <p class="lunar-date">${lunarStr}</p>
                                <p class="solar-date">${solarStr}</p>
                                <p class="role-title">គ្រូបន្ទុកថ្នាក់</p>
                                <div class="sig-image-box" >${classConfig.teacherSignature ? `<img src="${classConfig.teacherSignature}" style="transform: scale(${teacherScale}); transform-origin: center center;">` : ''}</div>
                                <p class="teacher-name-final" style="margin-left: 3cm;">${classConfig.teacherName || ''}</p>
                            </div>
                        </div>
                    `;
                }

                dynamicPagesHTML += `
                    <div class="a4-page relative">
                        ${pageHeader}
                        ${pageTable}
                        ${pageFooter}
                    </div>
                `;
            }

            document.getElementById('dynamicPagesContainer').innerHTML = dynamicPagesHTML;

            // Trigger Preview
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('printAreaWrapper').classList.remove('hidden');
            document.body.classList.add('preview-mode');
        }

        function closePreview() {
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('printAreaWrapper').classList.add('hidden');
            document.body.classList.remove('preview-mode');
        }

        function downloadPDF() {
            const element = document.getElementById('printContainer');
            // Adding this class removes margins & shadow specifically to guarantee perfectly sliced A4 heights
            element.classList.add('pdf-exporting');
            
            const opt = {
                margin: 0,
                filename: `Material_Production_${classConfig.className || 'Class'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                // Reset scrollY to 0 so page is captured correctly regardless of scroll depth
                html2canvas: { scale: 2, useCORS: true, logging: false, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                // Force explicit PDF pagination strictly on the CSS breaks
                pagebreak: { mode: ['css', 'legacy'] }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                element.classList.remove('pdf-exporting');
            });
        }
    </script>
</body>
</html>
