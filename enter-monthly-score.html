        body { 
            font-family: 'Battambang', cursive; 
            background-color: #f9fafb;
            color: #1f2937;
            min-height: 100vh; 
            margin: 0; 
            padding: 0; 
        }
        .kh-moul { font-family: 'Moul', cursive; font-weight: normal; }
        
        /* Table Styles (Matched with Student List) */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th {
            background-color: #f8fafc;
            color: #334155;
            font-weight: bold;
            padding: 12px;
            border: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .data-table td {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        
        .data-table tbody tr {
            background-color: #ffffff;
            transition: background-color 0.2s;
        }
        .data-table tbody tr:nth-child(even) {
            background-color: #fdfdfd;
        }
        .data-table tbody tr:hover {
            background-color: #f1f5f9;
        }
        
        .sticky-col {
            position: sticky;
            left: 0;
            z-index: 10;
            box-shadow: 2px 0 5px -2px rgba(0,0,0,0.05);
        }
        .data-table thead th.sticky-col {
            background-color: #f8fafc;
            z-index: 20;
            text-align: left;
        }
        .data-table tbody td.sticky-col {
            background-color: inherit; 
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
        }
        
        /* Custom Scrollbar */
        .table-wrapper::-webkit-scrollbar { height: 6px; }
        .table-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Inputs and Buttons */
        .form-select {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.2rem;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            outline: none;
            background: white;
            font-family: 'Battambang', cursive;
            transition: all 0.2s;
            cursor: pointer;
            font-weight: 700;
            color: #1f2937;
            font-size: 13px;
            appearance: none;
            -webkit-appearance: none;
        }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .input-score { 
            width: 100%; 
            max-width: 80px;
            text-align: center; 
            padding: 0.4rem; 
            border-radius: 0.375rem; 
            border: 1px solid #e2e8f0; 
            outline: none; 
            transition: all 0.2s; 
            font-weight: bold;
            color: #4f46e5;
            background: #f8fafc;
            font-size: 13px;
            -moz-appearance: textfield;
        }
        .input-score::-webkit-outer-spin-button,
        .input-score::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .input-score:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }
        .input-score::placeholder { color: #cbd5e1; font-weight: normal; }

        .type-btn {
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            transition: all 0.3s;
            border: 1px solid transparent;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 13px;
        }
        .type-btn.active {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
        }
        .type-btn.inactive {
            background-color: white;
            color: #64748b;
            border-color: #e2e8f0;
        }
        .type-btn.inactive:hover {
            border-color: #4f46e5;
            color: #4f46e5;
            background-color: #f8fafc;
        }

        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        
        /* Loading Overlay */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

</head>

            'ex_hw': [{ id: 'ex_hw', label: 'កិច្ចការផ្ទះ', width: '120px' }],

            'sem_moral_civics': [{ id: 'sem_moral_civics', label: 'សីលធម៌-ពលរដ្ឋ', width: '150px' }],
            'sem_geo': [{ id: 'sem_geo', label: 'ភូមិវិទ្យា', width: '150px' }],
            'sem_hist': [{ id: 'sem_hist', label: 'ប្រវត្តិវិទ្យា', width: '150px' }],
            'sem_home_arts': [{ id: 'sem_home_arts', label: 'គេហៈ-សិល្បៈ', width: '150px' }],
            'sem_life_skills': [{ id: 'sem_life_skills', label: 'បំណិនជីវិត', width: '150px' }],
            'sem_foreign': [{ id: 'sem_foreign', label: 'ភាសាបរទេស', width: '150px' }],
            'sem_kh_reading_speaking': [{ id: 'sem_kh_reading_speaking', label: 'អំណាន-ស្តាប់-និយាយ', width: '150px' }],
            'sem_kh_dictation': [{ id: 'sem_kh_dictation', label: 'សរសេរតាមអាន', width: '150px' }],
            'sem_kh_essay': [{ id: 'sem_kh_essay', label: 'តែងសេចក្តី', width: '150px' }],
            'sem_math': [{ id: 'sem_math', label: 'គណិតវិទ្យា', width: '150px' }],
            'sem_science': [{ id: 'sem_science', label: 'វិទ្យាសាស្ត្រ', width: '150px' }],
            'sem_sport': [{ id: 'sem_sport', label: 'អប់រំកាយ-សុខភាព', width: '150px' }]
        };

        const allMonthsMap = [
            { id: 'nov', label: 'វិច្ឆិកា', isNextYear: false },
            { id: 'dec', label: 'ធ្នូ', isNextYear: false },
            { id: 'jan', label: 'មករា', isNextYear: true },
            { id: 'feb', label: 'កុម្ភៈ', isNextYear: true },
            { id: 'mar', label: 'មីនា', isNextYear: true },
            { id: 'apr', label: 'មេសា', isNextYear: true },
            { id: 'may', label: 'ឧសភា', isNextYear: true },
            { id: 'jun', label: 'មិថុនា', isNextYear: true },
            { id: 'jul', label: 'កក្កដា', isNextYear: true },
            { id: 'aug', label: 'សីហា', isNextYear: true },
            { id: 'sep', label: 'កញ្ញា', isNextYear: true },
            { id: 'oct', label: 'តុលា', isNextYear: true }
        ];

        // --- STATE ---
        let students = [];
        let scoresData = {};
        let currentMode = 'monthly';

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('subjectSelect').innerHTML = monthlyOptionsHTML;
            document.getElementById('subjectSelect').value = "math_general"; 
            updateMonthOptions(); 
            lucide.createIcons();

            // Load Students (Async)
            await loadStudents();
            await loadScoresForCurrentPeriod();
        });

        function updateMonthOptions() {
            const yearVal = document.getElementById('yearSelect').value;
            if (!yearVal || !yearVal.includes('-')) return;
            
            const [startYear, endYear] = yearVal.split('-');
            const monthSelect = document.getElementById('monthSelect');
            const currentSelection = monthSelect.value; 

            let optionsHTML = '';
            allMonthsMap.forEach(m => {
                const y = m.isNextYear ? endYear : startYear;
                const selected = m.id === currentSelection ? 'selected' : '';
                optionsHTML += `<option value="${m.id}" ${selected}>ខែ${m.label} ឆ្នាំ ${y}</option>`;
            });

            monthSelect.innerHTML = optionsHTML;
            if (!currentSelection && monthSelect.options.length > 0) {
                 monthSelect.selectedIndex = 0;
            }
        }

        window.switchScoreType = function(mode) {
            currentMode = mode;
            const monthContainer = document.getElementById('monthContainer');
            const semesterContainer = document.getElementById('semesterContainer');
            const btnMonthly = document.getElementById('btnMonthly');
            const btnSemester = document.getElementById('btnSemester');
            const subjectSelect = document.getElementById('subjectSelect');

            if (mode === 'monthly') {
                monthContainer.classList.remove('hidden');
                semesterContainer.classList.add('hidden');
                
                btnMonthly.classList.add('active');
                btnMonthly.classList.remove('inactive');
                btnSemester.classList.add('inactive');
                btnSemester.classList.remove('active');

                subjectSelect.innerHTML = monthlyOptionsHTML;
                subjectSelect.value = "math_general";
            } else {
                monthContainer.classList.add('hidden');
                semesterContainer.classList.remove('hidden');

                btnSemester.classList.add('active');
                btnSemester.classList.remove('inactive');
                btnMonthly.classList.add('inactive');
                btnMonthly.classList.remove('active');

                subjectSelect.innerHTML = semesterOptionsHTML;
                subjectSelect.value = "sem_math";
            }
            loadScoresForCurrentPeriod();
        }

        // --- FIREBASE: LOAD STUDENTS ---
        async function loadStudents() {
            showLoading(true);
            try {
                // Try fetching from Firebase first
                const querySnapshot = await getDocs(collection(db, "students"));
                let onlineStudents = [];
                querySnapshot.forEach((doc) => {
                    onlineStudents.push({ id: doc.id, ...doc.data() });
                });

                if (onlineStudents.length > 0) {
                    students = onlineStudents;
                    console.log("Loaded students from Firebase");
                } else {
                    // Fallback to LocalStorage if Firebase is empty (for migration)
                    console.log("Firebase empty, checking localStorage...");
                    const storedStudents = localStorage.getItem('students');
                    students = storedStudents ? JSON.parse(storedStudents) : [];
                }
            } catch (e) {
                console.error("Error loading students:", e);
                // Fallback on error
                const storedStudents = localStorage.getItem('students');
                students = storedStudents ? JSON.parse(storedStudents) : [];
            } finally {
                showLoading(false);
                updateTableStructure();
            }
        }

        function getStorageKey() {
            const year = document.getElementById('yearSelect').value;
            let period = currentMode === 'monthly' ? document.getElementById('monthSelect').value : document.getElementById('semesterSelect').value;
            if(!period) period = currentMode === 'monthly' ? 'nov' : 'sem1';
            
            // This key is now used as Document ID in Firestore
            return `${year}_${period}`;
        }

        // --- FIREBASE: LOAD SCORES ---
        window.loadScoresForCurrentPeriod = async function() {
            showLoading(true);
            const docId = getStorageKey();
            
            try {
                const docRef = doc(db, "scores", docId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    scoresData = docSnap.data();
                } else {
                    scoresData = {};
                    console.log("No scores found for this period in Cloud");
                }
            } catch (error) {
                console.error("Error getting scores:", error);
                scoresData = {};
            } finally {
                showLoading(false);
                updateTableStructure();
            }
        }

        window.updateMonthOptions = updateMonthOptions;

        window.quickSelect = function(val) {
            const select = document.getElementById('subjectSelect');
            const exists = Array.from(select.options).some(opt => opt.value === val);
            if (exists) {
                select.value = val;
                updateTableStructure();
            } else if (currentMode === 'semester') {
                alert("ជម្រើសនេះមានតែនៅក្នុង 'ពិន្ទុប្រចាំខែ' ប៉ុណ្ណោះ។");
            }
        }

        window.updateTableStructure = function() {
            const subjectKey = document.getElementById('subjectSelect').value;
            const container = document.getElementById('tablesContainer');
            
            let columns = subjectConfigs[subjectKey] || subjectConfigs['math_general'];
            container.innerHTML = '';

            if (students.length === 0) {
                container.innerHTML = `
                    <div class="col-span-1 lg:col-span-2 text-center py-16 text-gray-400">
                        <i data-lucide="users" class="w-16 h-16 mx-auto mb-4 opacity-30"></i>
                        <p class="text-lg font-bold">មិនទាន់មានទិន្នន័យសិស្សនៅឡើយទេ</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            const half = Math.ceil(students.length / 2);
            const students1 = students.slice(0, half);
            const students2 = students.slice(half);

            container.appendChild(createTable(students1, columns, 0));
            if (students2.length > 0) {
                container.appendChild(createTable(students2, columns, half));
            }
            lucide.createIcons();
        }

        function createTable(studentList, columns, startIndex) {
            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper overflow-x-auto rounded-lg border border-gray-200 bg-white';
            
            let headerHTML = `
                <thead>
                    <tr>
                        <th class="w-12 text-center text-gray-500">ល.រ</th>
                        <th class="sticky-col min-w-[180px]">ឈ្មោះសិស្ស</th>
            `;

            columns.forEach(col => {
                headerHTML += `<th class="text-center" style="width: ${col.width}">${col.label}</th>`;
            });
            headerHTML += `</tr></thead>`;

            let tbodyHTML = '<tbody>';
            studentList.forEach((s, i) => {
                const actualIndex = startIndex + i;
                let inputsHTML = '';
                const studentScores = scoresData[s.id] || {};

                columns.forEach(col => {
                    const val = studentScores[col.id] !== undefined ? studentScores[col.id] : '';
                    inputsHTML += `
                        <td class="text-center px-1">
                            <input type="number" 
                                class="input-score" 
                                placeholder="-" 
                                min="0" max="100"
                                value="${val}"
                                onchange="cacheScore('${s.id}', '${col.id}', this.value)">
                        </td>
                    `;
                });

                const photoSrc = s.photo || 'https://api.dicebear.com/7.x/notionists/svg?seed=' + s.id;

                tbodyHTML += `
                    <tr>
                        <td class="text-center font-bold text-gray-500">${actualIndex + 1}</td>
                        <td class="font-bold text-gray-700 sticky-col">
                            <div class="flex items-center gap-3">
                                <img src="${photoSrc}" 
                                     class="w-8 h-8 rounded-full border border-gray-200 object-cover cursor-pointer hover:ring-2 ring-indigo-400 shrink-0" 
                                     onclick="showPhoto(this.src)"
                                     alt="Student Photo">
                                <span class="whitespace-nowrap">${s.name || '-'}</span>
                            </div>
                        </td>
                        ${inputsHTML}
                    </tr>
                `;
            });
            tbodyHTML += '</tbody>';

            const table = document.createElement('table');
            table.className = 'data-table';
            table.innerHTML = headerHTML + tbodyHTML;
            
            wrapper.appendChild(table);
            return wrapper;
        }

        window.cacheScore = function(studentId, subjectId, value) {
            if (!scoresData[studentId]) scoresData[studentId] = {};
            scoresData[studentId][subjectId] = value === '' ? 0 : parseFloat(value);
        }

        window.showPhoto = function(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('photoModal').style.display = 'flex';
        }

        // --- FIREBASE: SAVE SCORES ---
        window.saveScores = async function() {
            const btn = document.querySelector('button[onclick="saveScores()"]');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> កំពុងរក្សាទុក...';
            lucide.createIcons();

            const docId = getStorageKey();

            try {
                // Save to Firestore (merge: true keeps existing data in the document)
                await setDoc(doc(db, "scores", docId), scoresData, { merge: true });

                setTimeout(() => {
                    btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> រួចរាល់!';
                    btn.classList.replace('bg-[#2da143]', 'bg-[#1e7e31]');
                    btn.classList.replace('hover:bg-[#238535]', 'hover:bg-[#156623]');
                    lucide.createIcons();

                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        btn.classList.replace('bg-[#1e7e31]', 'bg-[#2da143]');
                        btn.classList.replace('hover:bg-[#156623]', 'hover:bg-[#238535]');
                        lucide.createIcons();
                    }, 1500);
                }, 500);
            } catch (error) {
                console.error("Error saving document: ", error);
                btn.innerHTML = '<i data-lucide="x" class="w-5 h-5"></i> បរាជ័យ!';
                btn.classList.replace('bg-[#2da143]', 'bg-red-600');
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-red-600', 'bg-[#2da143]');
                    lucide.createIcons();
                }, 2000);
            }
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
    </script>
