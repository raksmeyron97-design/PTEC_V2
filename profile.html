<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC - ព័ត៌មានគណនី</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #0054a6; --purple-theme: #7c3aed; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f3f4f6; min-height: 100vh; }
        .kh-moul { font-family: 'Moul', cursive; }
        
        .profile-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #d1d5db;
            outline: none;
            transition: all 0.2s;
            background: #ffffff;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 84, 166, 0.1);
        }
        
        .top-bar {
            height: 180px;
            background: linear-gradient(to right, #6d28d9, #0054a6);
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
        }

        /* Loading Overlay */
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-[#0054a6] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="kh-moul text-[#0054a6] text-lg animate-pulse" id="loadingText">កំពុងផ្ទៀងផ្ទាត់គណនី...</p>
    </div>

    <!-- Header Background -->
    <div class="top-bar fixed top-0 w-full z-0"></div>

    <!-- Main Content -->
    <div class="relative z-10 max-w-6xl mx-auto px-4 py-8 hidden" id="mainContent">
        <!-- Back Button -->
        <a href="index.html" class="inline-flex items-center gap-2 text-white/90 hover:text-white mb-6 font-bold transition">
            <i data-lucide="arrow-left" class="w-5 h-5"></i> ត្រឡប់ទៅទំព័រដើម
        </a>

        <div class="profile-card p-6 md:p-10 mt-8">
            <form id="profileForm">
                <!-- Profile Image Upload -->
                <div class="flex flex-col items-center -mt-20 mb-10">
                    <div class="relative group">
                        <div class="w-32 h-32 md:w-36 md:h-36 rounded-full border-4 border-white shadow-lg bg-white flex items-center justify-center overflow-hidden">
                            <i data-lucide="user" class="w-16 h-16 text-gray-300" id="avatarIcon"></i>
                            <img id="avatarPreview" src="" class="w-full h-full object-cover hidden">
                        </div>
                        <label class="absolute bottom-2 right-2 bg-[#0054a6] text-white p-2.5 rounded-full cursor-pointer hover:bg-blue-700 transition shadow-md">
                            <i data-lucide="camera" class="w-5 h-5"></i>
                            <input type="file" id="avatarInput" class="hidden" accept="image/*">
                        </label>
                    </div>
                    <p class="text-gray-500 text-sm mt-3">ចុចលើរូបដើម្បីប្តូររូបថត</p>
                </div>

                <!-- Personal Info Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
                    <div>
                        <label class="block text-[#7c3aed] font-bold mb-2 flex items-center gap-2">
                            <i data-lucide="user" class="w-4 h-4"></i> នាមត្រកូល
                        </label>
                        <input type="text" id="surname" class="form-input bg-gray-50" placeholder="ឧ. រ៉ន" value="">
                    </div>

                    <div>
                        <label class="block text-[#7c3aed] font-bold mb-2 flex items-center gap-2">
                            <i data-lucide="user" class="w-4 h-4"></i> ឈ្មោះ
                        </label>
                        <input type="text" id="name" class="form-input bg-gray-50" placeholder="ឧ. រស្មី" value="">
                    </div>

                    <div>
                        <label class="block text-[#7c3aed] font-bold mb-2 flex items-center gap-2">
                            <i data-lucide="phone" class="w-4 h-4"></i> លេខទូរស័ព្ទ
                        </label>
                        <input type="tel" id="phone" class="form-input bg-gray-50" placeholder="012 345 678" value="">
                    </div>
                </div>

                <!-- Administrative / School Info Section -->
                <div class="border-t border-gray-200 pt-8 mb-8">
                    <h3 class="text-xl font-bold text-[#0054a6] mb-6 kh-moul">ព័ត៌មានរដ្ឋបាល និង សាលារៀន</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                        
                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">១. អង្គភាពគ្រប់គ្រង ១</label>
                            <input type="text" id="management_unit_1" class="form-input text-sm" value="មន្ទីរអប់រំ យុវជន និងកីឡា រាជធានី/ខេត្តព្រៃវែង">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">២. អង្គភាពគ្រប់គ្រង ២</label>
                            <input type="text" id="management_unit_2" class="form-input text-sm" value="ការិយាល័យអប់រំ យុវជន និងកីឡារដ្ឋបាលក្រុង/ស្រុក/ខ">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">៣. ឈ្មោះសាលា</label>
                            <input type="text" id="school_name_admin" class="form-input text-sm" value="សាលាបឋមសិក្សា កពោត">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">៤. លេខកូដសាលា</label>
                            <input type="text" id="school_code" class="form-input text-sm" value="14090207006">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">៥. ឈ្មោះថ្នាក់</label>
                            <input type="text" id="class_name" class="form-input text-sm" value="ថ្នាក់ទី៦ «ក»">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">៦. ឈ្មោះគ្រូបន្ទុក</label>
                            <input type="text" id="homeroom_teacher" class="form-input text-sm" value="រុន រស្មី">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">៧. ភេទ</label>
                            <input type="text" id="gender" class="form-input text-sm" value="ប្រុស">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">៨. កម្រិតវប្បធម៌</label>
                            <input type="text" id="education_level" class="form-input text-sm" value="បរិញ្ញាប័ត្រ">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">៩. កម្រិតបណ្តុះបណ្តាល</label>
                            <input type="text" id="training_level" class="form-input text-sm" value="១២+៤">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">១០. អតីតភាពឆ្នាំ</label>
                            <input type="text" id="seniority_years" class="form-input text-sm" value="">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">១១. តួនាទីអ្នកគ្រប់គ្រង</label>
                            <input type="text" id="manager_role" class="form-input text-sm" value="នាយកសាលា">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">១២. រាជធានី-ខេត្ត (សម្រាប់ថ្ងៃខែ)</label>
                            <input type="text" id="province_for_date" class="form-input text-sm" value="ព្រៃវែង">
                        </div>

                        <div>
                            <label class="block text-gray-900 font-bold mb-2 text-sm">១៣. ឆ្នាំសិក្សា</label>
                            <input type="text" id="academic_year" class="form-input text-sm" value="២០២៤-២០២៥">
                        </div>

                    </div>
                </div>

                <!-- Security Section -->
                <div class="border-t border-gray-200 pt-8">
                    <h3 class="text-xl font-bold text-[#7c3aed] mb-6 kh-moul">សុវត្ថិភាពគណនី (ប្តូរពាក្យសម្ងាត់)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[#7c3aed] font-bold mb-2 flex items-center gap-2">
                                <i data-lucide="lock" class="w-4 h-4"></i> ពាក្យសម្ងាត់ថ្មី (បើចង់ប្តូរ)
                            </label>
                            <div class="relative flex items-center">
                                <input type="password" id="password" class="form-input pr-10 bg-gray-50" placeholder=".........">
                                <button type="button" class="absolute right-3 text-gray-400 hover:text-gray-600 outline-none" onclick="window.togglePassword('password', this)">
                                    <i data-lucide="eye" class="w-5 h-5 pointer-events-none"></i>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[#7c3aed] font-bold mb-2 flex items-center gap-2">
                                <i data-lucide="lock" class="w-4 h-4"></i> បញ្ជាក់ពាក្យសម្ងាត់ថ្មី
                            </label>
                            <div class="relative flex items-center">
                                <input type="password" id="confirmPassword" class="form-input pr-10 bg-gray-50" placeholder=".........">
                                <button type="button" class="absolute right-3 text-gray-400 hover:text-gray-600 outline-none" onclick="window.togglePassword('confirmPassword', this)">
                                    <i data-lucide="eye" class="w-5 h-5 pointer-events-none"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <p class="text-sm text-gray-500 mt-2">* ទុកប្រអប់ចំហរ ប្រសិនបើអ្នកមិនចង់ប្តូរពាក្យសម្ងាត់។</p>
                </div>

                <div class="mt-10">
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-purple-600 to-[#0054a6] text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl hover:scale-[1.01] transition-all flex items-center justify-center gap-2">
                        <i data-lucide="check-circle" class="w-5 h-5"></i> រក្សាទុកការកែប្រែ
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Script Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU50HJrekgHWwwyLq5CTRwhjHkGJAAAfs",
            authDomain: "classroom-management-82382.firebaseapp.com",
            projectId: "classroom-management-82382",
            storageBucket: "classroom-management-82382.firebasestorage.app",
            messagingSenderId: "146641865620",
            appId: "1:146641865620:web:ce693b7b064afd5d1bdd81",
            measurementId: "G-PX867PB723"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const PTEC_APP_ID = "ptec-app";
        let currentUser = null;

        lucide.createIcons();

        // UI Elements
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const mainContent = document.getElementById('mainContent');

        // Toggle Password Logic (Export to window scope for inline onclick)
        window.togglePassword = function(inputId, buttonEl) {
            const input = document.getElementById(inputId);
            const iconEl = buttonEl.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                iconEl.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                iconEl.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        };

        // List of all input fields IDs to save/load
        const formFields = [
            'surname', 'name', 'phone',
            'management_unit_1', 'management_unit_2', 'school_name_admin',
            'school_code', 'class_name', 'homeroom_teacher', 'gender',
            'education_level', 'training_level', 'seniority_years',
            'manager_role', 'province_for_date', 'academic_year'
        ];

        // 1. Check Auth & Load Data
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadingText.textContent = "កំពុងទាញយកទិន្នន័យ...";
                await loadProfileData();
                loadingOverlay.style.display = 'none';
                mainContent.classList.remove('hidden');
            } else {
                alert('សូមចូលគណនីជាមុនសិន!');
                window.location.href = 'index.html';
            }
        });

        async function loadProfileData() {
            try {
                const docRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'profile', 'data');
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const profile = docSnap.data();
                    
                    formFields.forEach(fieldId => {
                        if (profile[fieldId] !== undefined) {
                            const el = document.getElementById(fieldId);
                            if (el) el.value = profile[fieldId];
                        }
                    });
                    
                    // Load Image
                    if (profile.image) {
                        const img = document.getElementById('avatarPreview');
                        const icon = document.getElementById('avatarIcon');
                        img.src = profile.image;
                        img.classList.remove('hidden');
                        icon.classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error("Error loading profile data:", error);
            }
        }

        // 2. Handle Image Upload & Compress Base64
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Ensure image isn't too large for Firestore Document (Max 1MB allowed by default logic rule of thumb)
                if (file.size > 1024 * 1024) { 
                    alert('សូមអភ័យទោស ទំហំរូបថតធំពេក (លើសពី 1MB)។ សូមជ្រើសរើសរូបថតទំហំតូចជាងនេះ។');
                    this.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('avatarPreview');
                    const icon = document.getElementById('avatarIcon');
                    img.src = event.target.result;
                    img.classList.remove('hidden');
                    icon.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. Save Data to Firestore
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!currentUser) return;

            const pwd = document.getElementById('password').value;
            const confirmPwd = document.getElementById('confirmPassword').value;

            // Handle Password Update if inputs are not empty
            if (pwd || confirmPwd) {
                if (pwd !== confirmPwd) {
                    alert("ពាក្យសម្ងាត់ និងការបញ្ជាក់ពាក្យសម្ងាត់ មិនត្រូវគ្នាទេ។ សូមពិនិត្យម្តងទៀត!");
                    return;
                }
                try {
                    await updatePassword(currentUser, pwd);
                    alert("ពាក្យសម្ងាត់ត្រូវបានផ្លាស់ប្តូរដោយជោគជ័យ!");
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                } catch (error) {
                    console.error("Password update error:", error);
                    alert("បរាជ័យក្នុងការប្តូរពាក្យសម្ងាត់! អ្នកប្រហែលជាត្រូវ Logout និង Login ម្តងទៀត ដើម្បីអាចប្តូរវាបាន (តម្រូវការសុវត្ថិភាព Firebase)។");
                    return;
                }
            }

            const profileData = {};
            
            // Collect text fields
            formFields.forEach(fieldId => {
                const el = document.getElementById(fieldId);
                if (el) profileData[fieldId] = el.value;
            });

            // Collect Image
            const hasImage = !document.getElementById('avatarPreview').classList.contains('hidden');
            if (hasImage) {
                profileData.image = document.getElementById('avatarPreview').src;
            }

            // Show Loading State
            const btn = document.getElementById('submitBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> កំពុងរក្សាទុក...';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const docRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', currentUser.uid, 'profile', 'data');
                await setDoc(docRef, profileData, { merge: true });

                // Success visual feedback
                btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> រួចរាល់!';
                lucide.createIcons();
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    lucide.createIcons();
                    
                    // Show small success popup
                    const toast = document.createElement('div');
                    toast.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-[#0054a6] text-white px-8 py-3 rounded-lg shadow-lg z-[3000] font-bold text-sm flex items-center gap-2 transition-all";
                    toast.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> ព័ត៌មានត្រូវបានកែប្រែជោគជ័យ!';
                    document.body.appendChild(toast);
                    lucide.createIcons();
                    
                    setTimeout(() => toast.remove(), 2500);

                }, 1000);

            } catch (error) {
                console.error("Error saving profile to Firestore:", error);
                alert("មិនអាចរក្សាទុកបានទេ! មានបញ្ហាភ្ជាប់ទៅកាន់ Database។");
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
