<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>តាមដានទម្ងន់ និងកម្ពស់សិស្ស</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Taprom&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- បណ្ណាល័យសម្រាប់បង្កើត PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ThyrithSor/momentkh@3.0.3/momentkh.js"></script>
    
    <style>
        :root {
            --khmer-moul: 'Moul', cursive;
            --khmer-battambang: 'Battambang', sans-serif;
            --khmer-siemreap: 'Siemreap', sans-serif;
            --khmer-taprom: 'Taprom', cursive;
            --primary: #4f46e5;
        }

        body {
            font-family: var(--khmer-battambang);
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .kh-moul, .font-moul { font-family: var(--khmer-moul); font-weight: normal; }
        .font-taprom { font-family: var(--khmer-taprom); }
        .text-shadow-custom { text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* --- សម្រាប់ទិដ្ឋភាពលើអេក្រង់ (Web UI) --- */
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th { background-color: #f8fafc; color: #334155; font-weight: bold; padding: 14px 12px; border: 1px solid #e2e8f0; white-space: nowrap; }
        .data-table td { padding: 8px 12px; border: 1px solid #e2e8f0; vertical-align: middle; }
        .data-table tbody tr { background-color: #ffffff; transition: background-color 0.2s; }
        .data-table tbody tr:nth-child(even) { background-color: #fdfdfd; }
        .data-table tbody tr:hover { background-color: #f1f5f9; }
        
        .sticky-col { position: sticky; left: 0; z-index: 10; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.05); }
        .data-table thead th.sticky-col { background-color: #f8fafc; z-index: 20; text-align: left; }
        .data-table tbody td.sticky-col { background-color: inherit; }

        .table-wrapper { overflow-x: auto; border-radius: 6px; border: 1px solid #e5e7eb; background: white; }
        .table-wrapper::-webkit-scrollbar { height: 6px; }
        .table-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .input-val { width: 100%; max-width: 85px; text-align: center; padding: 0.5rem; border-radius: 0.375rem; border: 1px solid #e2e8f0; outline: none; transition: all 0.2s; font-weight: bold; color: #4f46e5; background: #f8fafc; font-size: 15px; }
        .input-val:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }
        .input-text { width: 100%; min-width: 120px; text-align: left; padding: 0.5rem 0.6rem; border-radius: 0.375rem; border: 1px solid #e2e8f0; outline: none; transition: all 0.2s; background: #f8fafc; font-size: 14px; color: #1f2937; }
        .input-text:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }

        .input-field {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            outline: none;
            background: #f8fafc;
            font-family: var(--khmer-battambang);
            transition: all 0.2s;
            font-weight: 700;
        }
        .input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }

        /* --- សម្រាប់ទិដ្ឋភាពក្រដាសបោះពុម្ព (Print UI) --- */
        .page-a4 {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 0 auto 20px auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            font-family: var(--khmer-battambang);
            position: relative;
        }
        
        .cover-page { display: flex; flex-direction: column; align-items: center; }
        .cover-border { position: absolute; top: 15mm; bottom: 15mm; left: 15mm; right: 15mm; border: 4px solid #d4af37; outline: 2px solid #d4af37; outline-offset: 4px; pointer-events: none; }

        .print-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .print-table th, .print-table td { border: 1px solid black; padding: 6px; text-align: center; font-size: 13px; }
        .print-table th { font-family: var(--khmer-moul); background-color: #f9fafb; font-weight: normal; font-size: 12px; padding: 8px; }
        .print-input { width: 100%; border: none; background: transparent; text-align: center; outline: none; padding: 0; font-family: var(--khmer-battambang); }

        .keep-together { page-break-inside: avoid; break-inside: avoid; }
        .no-border-row td { border: none !important; padding-top: 20px !important; }
        .print-table tbody tr.data-row { height: 38px; }

        /* ស្ទាយថ្មីសម្រាប់ប្រអប់រូបភាពហត្ថលេខាដែលអាចត្រួតស៊ីគ្នាបាន */
        .sig-image-box { height: 75px; margin-top: 5px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 5; }
        .sig-image-box img { max-height: 100%; max-width: 160px; object-fit: contain; mix-blend-mode: multiply; pointer-events: none; }
        .teacher-name-final { font-family: var(--khmer-moul); font-size: 11.5pt; margin-top: 5px; display: block; text-align: center; position: relative; z-index: 10; }

        /* --- PDF Export Specific Styles --- */
        .pdf-exporting { background: white !important; }
        .pdf-exporting .screen-only { display: none !important; }
        .pdf-exporting .print-only { display: flex !important; flex-direction: column; align-items: center; width: 1024px !important; position: absolute; left: 0; top: 0; z-index: -999; }
        
        .pdf-exporting .page-a4 {
            width: 794px !important; 
            height: 1123px !important; 
            min-height: 1123px !important;
            max-height: 1123px !important;
            margin: 0 !important;
            box-shadow: none !important;
            border: none !important;
            overflow: hidden !important; 
            page-break-after: always;
            padding: 56px !important; 
            background: white !important;
            transform: scale(1) !important;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        @media screen { .print-only { display: none; } }
        @media print {
            @page { size: A4 portrait; margin: 0 !important; }
            body, html { background: white !important; margin: 0 !important; padding: 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .screen-only { display: none !important; }
            .print-only { display: block !important; }
            .page-a4 { 
                box-shadow: none !important; margin: 0 !important; width: 210mm !important; 
                min-height: 297mm !important; max-height: 297mm !important; padding: 15mm !important;
                page-break-after: always; border: none !important; overflow: hidden !important;
            }
        }
    </style>
</head>
<body>

    <!-- វគ្គទី ១៖ ទិដ្ឋភាពលើអេក្រង់ (Web UI) -->
    <div class="screen-only">
        <nav class="bg-indigo-900 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="container mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <h1 class="kh-moul text-lg hidden sm:block ml-2">តាមដានទម្ងន់ និងកម្ពស់សិស្ស (មាន BMI)</h1>
                </div>
                <div class="text-sm font-bold flex items-center gap-2 sm:gap-4">
                    <button onclick="toggleSignatureSettings()" class="hover:text-indigo-200 transition-colors flex items-center gap-1 bg-white/20 px-3 py-1.5 rounded-md">
                        <i data-lucide="pen-tool" class="w-4 h-4"></i> ហត្ថលេខា
                    </button>
                    <button id="btnDownloadTop" onclick="downloadPDF()" class="hover:text-indigo-200 transition-colors flex items-center gap-1 bg-white/10 px-3 py-1.5 rounded-md text-red-100 hover:text-red-200 hover:bg-white/20">
                        <i data-lucide="download" class="w-4 h-4"></i> ទាញយក PDF
                    </button>
                    <button onclick="window.print()" class="hover:text-indigo-200 transition-colors flex items-center gap-1 bg-white/10 px-3 py-1.5 rounded-md hidden sm:flex">
                        <i data-lucide="printer" class="w-4 h-4"></i> បោះពុម្ព
                    </button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto p-4 md:p-6 mt-4 pb-20 max-w-[1400px]">
            
            <!-- ផ្នែកកំណត់ហត្ថលេខាសម្រាប់ការបោះពុម្ព -->
            <div id="signatureSettingsBox" class="hidden bg-indigo-50 border border-indigo-100 p-5 md:p-6 rounded-2xl mb-8 shadow-sm transition-all duration-300">
                <div class="flex items-center justify-between mb-5">
                    <h4 class="text-sm font-bold text-indigo-800 flex items-center gap-2">
                        <i data-lucide="pen-tool" class="w-5 h-5"></i> កំណត់អ្នកចុះហត្ថលេខាសម្រាប់ការបោះពុម្ព
                    </h4>
                    <button type="button" onclick="toggleSignatureSettings()" class="text-slate-400 hover:text-slate-600 transition p-1">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- នាយកសាលា -->
                    <div class="space-y-4 bg-white p-5 rounded-xl border border-indigo-50 shadow-sm">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">ឈ្មោះនាយកសាលា</label>
                            <input type="text" id="managerNameInput" placeholder="វាយបញ្ចូលឈ្មោះ..." class="input-field py-2.5 px-4 text-sm" onchange="updateSignatures()">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">រូបភាពហត្ថលេខា / ត្រា (បើមាន)</label>
                            <div class="flex flex-col xl:flex-row items-start xl:items-center gap-3">
                                <input type="file" id="managerSignatureInput" accept="image/*" class="text-xs text-slate-500 file:cursor-pointer file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors w-full" onchange="handleSignatureUpload('manager')">
                                
                                <div class="flex items-center gap-2 flex-shrink-0 w-full sm:w-auto justify-between sm:justify-start">
                                    <div class="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg p-1">
                                        <button type="button" onclick="zoomSignature('manager', -0.1)" class="p-1.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-colors"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                                        <div id="managerSigPreview" class="h-10 w-16 flex items-center justify-center overflow-hidden bg-white border border-dashed border-slate-200 rounded"></div>
                                        <button type="button" onclick="zoomSignature('manager', 0.1)" class="p-1.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-colors"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
                                    </div>
                                    <button type="button" onclick="removeSignature('manager')" class="text-rose-400 hover:text-rose-600 p-2 rounded-lg hover:bg-rose-50 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- គ្រូបន្ទុកថ្នាក់ -->
                    <div class="space-y-4 bg-white p-5 rounded-xl border border-indigo-50 shadow-sm">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">ឈ្មោះគ្រូបន្ទុកថ្នាក់</label>
                            <input type="text" id="teacherNameInput" placeholder="វាយបញ្ចូលឈ្មោះ..." class="input-field py-2.5 px-4 text-sm" onchange="updateSignatures()">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-2 ml-1">រូបភាពហត្ថលេខា (បើមាន)</label>
                            <div class="flex flex-col xl:flex-row items-start xl:items-center gap-3">
                                <input type="file" id="teacherSignatureInput" accept="image/*" class="text-xs text-slate-500 file:cursor-pointer file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors w-full" onchange="handleSignatureUpload('teacher')">
                                
                                <div class="flex items-center gap-2 flex-shrink-0 w-full sm:w-auto justify-between sm:justify-start">
                                    <div class="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg p-1">
                                        <button type="button" onclick="zoomSignature('teacher', -0.1)" class="p-1.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-colors"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                                        <div id="teacherSigPreview" class="h-10 w-16 flex items-center justify-center overflow-hidden bg-white border border-dashed border-slate-200 rounded"></div>
                                        <button type="button" onclick="zoomSignature('teacher', 0.1)" class="p-1.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-colors"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
                                    </div>
                                    <button type="button" onclick="removeSignature('teacher')" class="text-rose-400 hover:text-rose-600 p-2 rounded-lg hover:bg-rose-50 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative">
                <div class="h-2 w-full bg-[#2da143]"></div>
                
                <div class="p-6 md:p-8">
                    
                    <!-- Dashboard Statistics (មុខងារថ្មី) -->
                    <div id="statsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        <!-- បង្កើតដោយ JavaScript -->
                    </div>

                    <div class="mb-8 max-w-sm">
                        <label class="block text-xs font-bold text-gray-500 mb-2 ml-1">ជ្រើសរើសខែបច្ចុប្បន្ន</label>
                        <div class="relative">
                            <i data-lucide="calendar" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <select id="monthSelect" class="w-full pl-10 pr-3 py-2.5 rounded-lg border border-gray-200 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-battambang text-sm" onchange="updateMonthDisplay()">
                                <option value="">-- បញ្ចូលខែ --</option>
                                <option value="មករា">មករា</option>
                                <option value="កុម្ភៈ">កុម្ភៈ</option>
                                <option value="មីនា">មីនា</option>
                                <option value="មេសា">មេសា</option>
                                <option value="ឧសភា">ឧសភា</option>
                                <option value="មិថុនា">មិថុនា</option>
                                <option value="កក្កដា">កក្កដា</option>
                                <option value="សីហា">សីហា</option>
                                <option value="កញ្ញា">កញ្ញា</option>
                                <option value="តុលា">តុលា</option>
                                <option value="វិច្ឆិកា">វិច្ឆិកា</option>
                                <option value="ធ្នូ">ធ្នូ</option>
                            </select>
                        </div>
                    </div>

                    <div id="webTablesContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start mb-8">
                        <!-- បង្កើតដោយ JavaScript -->
                    </div>

                    <div class="flex flex-col md:flex-row gap-4 mt-6 pt-6 border-t border-gray-100">
                        <button onclick="saveData(true)" class="flex-1 py-3 bg-[#2da143] hover:bg-[#238535] text-white rounded-lg font-bold shadow-sm transition flex justify-center items-center gap-2">
                            <i data-lucide="save" class="w-5 h-5"></i>
                            រក្សាទុកទិន្នន័យ
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div id="photoModal" class="modal" onclick="this.style.display='none'">
            <div class="bg-white p-2 rounded-xl shadow-2xl max-w-sm w-full mx-4" onclick="event.stopPropagation()">
                <img id="modalImg" src="" class="w-full h-auto rounded-lg" alt="Student Photo">
                <button onclick="document.getElementById('photoModal').style.display='none'" class="mt-4 w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 rounded transition-colors">បិទ</button>
            </div>
        </div>
    </div>

    <!-- វគ្គទី ២៖ ទិដ្ឋភាពបោះពុម្ព (Print UI) -->
    <div class="print-only">
        <!-- ក្របមុខ (Cover Page) -->
        <div class="page-a4 cover-page">
            <div class="cover-border"></div>
            <div class="text-center w-full mt-4">
                <h1 class="font-moul text-xl mb-2">ព្រះរាជាណាចក្រកម្ពុជា</h1>
                <h2 class="font-moul text-lg">ជាតិ សាសនា ព្រះមហាក្សត្រ</h2>
                <img src="https://lh3.googleusercontent.com/d/1BnGzoisjHxGRiMbsrP-rZ1F9zvSfdtAh" alt="divider" class="h-[16px] w-auto mx-auto mt-3 mb-8" crossorigin="anonymous">
            </div>

            <div class="w-full text-left mt-4 pl-8">
                <p class="font-moul text-base mb-3 leading-relaxed" id="cover-unit1">ការិយាល័យអប់រំ យុវជន និងកីឡានៃរដ្ឋបាលស្រុក</p>
                <p class="font-moul text-base mb-3" id="cover-unit2">កម្រង...</p>
                <p class="font-moul text-base mb-3" id="cover-school">សាលាបឋមសិក្សា...</p>
            </div>

            <div class="flex-1 flex flex-col justify-center items-center w-full space-y-10 mt-10" style="min-height: 400px;">
                <h1 class="font-moul text-6xl text-blue-600 text-shadow-custom" style="font-weight: normal;">សៀវភៅ</h1>
                <h2 class="font-moul text-4xl text-red-500 text-shadow-custom leading-normal text-center w-full px-8">តាមដានទម្ងន់ និងកម្ពស់សិស្ស</h2>
                <h3 class="font-moul text-4xl text-green-600 text-shadow-custom" id="cover-class">ថ្នាក់ទី...</h3>
            </div>

            <div class="w-full text-center mt-auto mb-8 space-y-4">
                <p class="font-moul text-3xl" id="cover-teacher">លោកគ្រូ/អ្នកគ្រូ...</p>
                <p class="font-moul text-3xl">ឆ្នាំសិក្សា <span id="cover-year">២០២៥-២០២៦</span></p>
            </div>
        </div>

        <!-- ទំព័រទិន្នន័យ -->
        <div id="print-pages-container" class="w-full flex flex-col items-center">
            <!-- Data pages injected here by JS -->
        </div>
    </div>

    <script>
        // --- ផ្នែកគ្រប់គ្រងទិន្នន័យ ---
        let students = [];
        let healthData = {};
        let classConfig = {};
        let printSettings = {}; 

        // បម្លែងលេខឡាតាំងទៅលេខខ្មែរ (គាំទ្រទាំងលេខទសភាគ)
        function toKhNum(num) {
            if (num === undefined || num === null) return '';
            const khNums = ['០', '១', '២', '៣', '៤', '៥', '៦', '៧', '៨', '៩'];
            return num.toString().split('').map(n => khNums[parseInt(n)] || n).join('');
        }

        // អនុគមន៍គណនា BMI ថ្មី
        function calcBMI(h_cm, w_kg) {
            const h = parseFloat(h_cm);
            const w = parseFloat(w_kg);
            
            // កំណត់លក្ខខណ្ឌ៖ គណនាតែពេលទិន្នន័យសមហេតុផល (ការពារបញ្ហាលោតលេខធំពេលកំពុងវាយមិនទាន់ចប់)
            // ឧទាហរណ៍៖ កម្ពស់ត្រូវតែ >= 50cm និងទម្ងន់ >= 5kg ទើបចាប់ផ្តើមគណនា
            if (!h || !w || isNaN(h) || isNaN(w) || h < 50 || w < 5) {
                return { val: '-', text: '-', color: 'bg-gray-100 text-gray-400' };
            }
            
            const h_m = h / 100;
            const bmi = (w / (h_m * h_m)).toFixed(1);
            const raw = parseFloat(bmi);
            
            let text = '';
            let color = '';
            
            if (raw < 18.5) { 
                text = 'ស្គម'; 
                color = 'bg-yellow-100 text-yellow-700 border border-yellow-200'; 
            }
            else if (raw >= 18.5 && raw <= 24.9) { 
                text = 'ធម្មតា'; 
                color = 'bg-emerald-100 text-emerald-700 border border-emerald-200'; 
            }
            else if (raw >= 25 && raw <= 29.9) { 
                text = 'លើសទម្ងន់'; 
                color = 'bg-orange-100 text-orange-700 border border-orange-200'; 
            }
            else { 
                text = 'ធាត់ខ្លាំង'; 
                color = 'bg-red-100 text-red-700 border border-red-200'; 
            }
            
            return { val: bmi, text: text, color: color, raw: raw };
        }

        function initApp() {
            students = JSON.parse(localStorage.getItem('students') || '[]');
            healthData = JSON.parse(localStorage.getItem('data_health_tracking') || '{}');
            
            if (healthData['month_selected']) {
                document.getElementById('monthSelect').value = healthData['month_selected'];
            }

            loadSettings();
            updateStats(); // បង្ហាញ Dashboard
            renderWebTables();
            renderPrintPages(); 
            lucide.createIcons();
        }

        // មុខងារថ្មី៖ ធ្វើបច្ចុប្បន្នភាពទិន្នន័យ Dashboard
        function updateStats() {
            let total = students.length;
            let underweight = 0, normal = 0, overweight = 0, obese = 0, assessed = 0;

            students.forEach((s, i) => {
                const h = healthData[`h_${i}`];
                const w = healthData[`w_${i}`];
                const bmi = calcBMI(h, w);
                if (bmi.raw) {
                    assessed++;
                    if (bmi.raw < 18.5) underweight++;
                    else if (bmi.raw <= 24.9) normal++;
                    else if (bmi.raw <= 29.9) overweight++;
                    else obese++;
                }
            });

            document.getElementById('statsContainer').innerHTML = `
                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 shadow-sm flex flex-col justify-center items-center relative overflow-hidden">
                    <div class="absolute -right-3 -top-3 opacity-10"><i data-lucide="users" class="w-16 h-16 text-blue-500"></i></div>
                    <div class="text-blue-600 text-xs font-bold mb-1 z-10">បានវាស់វែង / សរុប</div>
                    <div class="text-2xl font-moul text-blue-700 z-10">${toKhNum(assessed)} / ${toKhNum(total)}</div>
                </div>
                <div class="bg-emerald-50/50 p-4 rounded-xl border border-emerald-100 shadow-sm flex flex-col justify-center items-center relative overflow-hidden">
                    <div class="absolute -right-3 -top-3 opacity-10"><i data-lucide="activity" class="w-16 h-16 text-emerald-500"></i></div>
                    <div class="text-emerald-600 text-xs font-bold mb-1 z-10">ធម្មតា (Normal)</div>
                    <div class="text-2xl font-moul text-emerald-700 z-10">${toKhNum(normal)} <span class="text-sm font-battambang">នាក់</span></div>
                </div>
                <div class="bg-yellow-50/50 p-4 rounded-xl border border-yellow-100 shadow-sm flex flex-col justify-center items-center relative overflow-hidden">
                    <div class="absolute -right-3 -top-3 opacity-10"><i data-lucide="trending-down" class="w-16 h-16 text-yellow-500"></i></div>
                    <div class="text-yellow-600 text-xs font-bold mb-1 z-10">ស្គម (Underweight)</div>
                    <div class="text-2xl font-moul text-yellow-700 z-10">${toKhNum(underweight)} <span class="text-sm font-battambang">នាក់</span></div>
                </div>
                <div class="bg-rose-50/50 p-4 rounded-xl border border-rose-100 shadow-sm flex flex-col justify-center items-center relative overflow-hidden">
                    <div class="absolute -right-3 -top-3 opacity-10"><i data-lucide="trending-up" class="w-16 h-16 text-rose-500"></i></div>
                    <div class="text-rose-600 text-xs font-bold mb-1 z-10">លើសទម្ងន់/ធាត់</div>
                    <div class="text-2xl font-moul text-rose-700 z-10">${toKhNum(overweight + obese)} <span class="text-sm font-battambang">នាក់</span></div>
                </div>
            `;
            if (window.lucide) lucide.createIcons();
        }

        function toggleSignatureSettings() {
            const box = document.getElementById('signatureSettingsBox');
            box.classList.toggle('hidden');
        }

        function loadSettings() {
            const defaultSettings = {
                unit1: "ការិយាល័យអប់រំ យុវជន និងកីឡានៃរដ្ឋបាលស្រុក", 
                unit2: "កម្រង...", 
                schoolName: "សាលាបឋមសិក្សា...",
                className: "ថ្នាក់ទី...", 
                teacherName: "លោកគ្រូ/អ្នកគ្រូ...",
                academicYear: "២០២៥-២០២៦",
                managerName: "",
                managerSignature: null, managerSigScale: 1.0,
                teacherSignature: null, teacherSigScale: 1.0,
                location: "................"
            };
            
            try {
                classConfig = JSON.parse(localStorage.getItem('app_settings')) || defaultSettings;
                if (typeof classConfig.managerSigScale !== 'number') classConfig.managerSigScale = 1.0;
                if (typeof classConfig.teacherSigScale !== 'number') classConfig.teacherSigScale = 1.0;
            } catch(e) { classConfig = defaultSettings; }

            printSettings = classConfig; 
            
            if(classConfig.unit1) document.getElementById('cover-unit1').innerText = classConfig.unit1;
            if(classConfig.unit2) document.getElementById('cover-unit2').innerText = classConfig.unit2;
            if(classConfig.schoolName) document.getElementById('cover-school').innerText = classConfig.schoolName;
            
            if(classConfig.className) {
                let classNameStr = classConfig.className || '';
                let cleanClass = classNameStr.replace(/ថ្នាក់ទី/g, '').replace(/ថ្នាក់/g, '').trim();
                document.getElementById('cover-class').innerText = cleanClass ? 'ថ្នាក់ទី ' + cleanClass : 'ថ្នាក់ទី...';
                printSettings.cleanClassName = cleanClass; 
            }
            
            if(classConfig.teacherName) {
                document.getElementById('cover-teacher').innerText = classConfig.teacherName;
                document.getElementById('teacherNameInput').value = classConfig.teacherName || '';
            }
            if(classConfig.academicYear) document.getElementById('cover-year').innerText = classConfig.academicYear;
            if(classConfig.managerName) document.getElementById('managerNameInput').value = classConfig.managerName || '';

            renderSignaturePreview('manager');
            renderSignaturePreview('teacher');
        }

        function updateSignatures() {
            classConfig.managerName = document.getElementById('managerNameInput').value;
            classConfig.teacherName = document.getElementById('teacherNameInput').value;
            localStorage.setItem('app_settings', JSON.stringify(classConfig));
        }

        function handleSignatureUpload(type) {
            const input = document.getElementById(type + 'SignatureInput');
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    if (type === 'manager') {
                        classConfig.managerSignature = base64;
                        classConfig.managerSigScale = 1.0;
                    } else {
                        classConfig.teacherSignature = base64;
                        classConfig.teacherSigScale = 1.0; 
                    }
                    localStorage.setItem('app_settings', JSON.stringify(classConfig));
                    renderSignaturePreview(type);
                };
                reader.readAsDataURL(file);
            }
        }

        function removeSignature(type) {
            if (type === 'manager') {
                classConfig.managerSignature = null;
            } else {
                classConfig.teacherSignature = null;
            }
            localStorage.setItem('app_settings', JSON.stringify(classConfig));
            document.getElementById(type + 'SignatureInput').value = ''; 
            renderSignaturePreview(type);
        }

        function zoomSignature(type, delta) {
            const scaleKey = type + 'SigScale';
            classConfig[scaleKey] = (classConfig[scaleKey] || 1.0) + delta;
            classConfig[scaleKey] = Math.max(0.2, Math.min(3.0, classConfig[scaleKey]));
            localStorage.setItem('app_settings', JSON.stringify(classConfig));
            renderSignaturePreview(type);
        }

        function renderSignaturePreview(type) {
            const previewDiv = document.getElementById(type + 'SigPreview');
            const sigData = type === 'manager' ? classConfig.managerSignature : classConfig.teacherSignature;
            const scale = classConfig[type + 'SigScale'] || 1.0;
            
            if (sigData) {
                previewDiv.innerHTML = `<img src="${sigData}" style="transform: scale(${scale});" class="h-full w-full object-contain">`;
            } else {
                previewDiv.innerHTML = `<span class="text-[10px] text-slate-400">គ្មាន</span>`;
            }
        }

        // --- ផ្នែកបង្កើតតារាងបញ្ចូលទិន្នន័យ (Web UI) ---
        function renderWebTables() {
            const container = document.getElementById('webTablesContainer');
            container.innerHTML = '';

            if (students.length === 0) {
                container.innerHTML = `<div class="col-span-1 lg:col-span-2 text-center py-16 text-gray-400"><p class="text-lg font-bold">មិនទាន់មានទិន្នន័យសិស្ស</p></div>`;
                return;
            }

            const half = Math.ceil(students.length / 2);
            container.appendChild(createWebTableFragment(students.slice(0, half), 0));
            if (students.length > half) {
                container.appendChild(createWebTableFragment(students.slice(half), half));
            }
        }

        function createWebTableFragment(studentList, startIndex) {
            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper overflow-x-auto rounded-lg border border-gray-200 bg-white shadow-sm';
            
            // កែសម្រួលក្បាលតារាង (Header)
            let headerHTML = `<thead>
                <tr>
                    <th class="w-12 text-center text-gray-500">ល.រ</th>
                    <th class="sticky-col min-w-[180px]">ឈ្មោះសិស្ស</th>
                    <th class="text-center w-24 text-sm">កម្ពស់<br><span class="text-[11px] text-gray-400">(cm)</span></th>
                    <th class="text-center w-24 text-sm">ទម្ងន់<br><span class="text-[11px] text-gray-400">(kg)</span></th>
                    <th class="text-center w-20 text-sm">BMI</th>
                    <th class="text-center w-28 text-sm">ស្ថានភាព</th>
                    <th class="text-center min-w-[120px]">ផ្សេងៗ</th>
                </tr>
            </thead>`;

            let tbodyHTML = '<tbody>';
            studentList.forEach((s, i) => {
                const idx = startIndex + i;
                const hVal = healthData[`h_${idx}`] || '';
                const wVal = healthData[`w_${idx}`] || '';
                const nVal = healthData[`n_${idx}`] || '';
                const photoSrc = s.photo || 'https://api.dicebear.com/7.x/notionists/svg?seed=' + s.id;
                
                // គណនា BMI ពេល Load លើកដំបូង
                const bmiData = calcBMI(hVal, wVal);

                tbodyHTML += `<tr>
                    <td class="text-center font-bold text-gray-500">${idx + 1}</td>
                    <td class="font-bold text-gray-700 sticky-col">
                        <div class="flex items-center gap-3">
                            <img src="${photoSrc}" class="w-8 h-8 rounded-full border border-gray-200 object-cover cursor-pointer hover:ring-2 ring-indigo-400 shrink-0" onclick="showPhoto(this.src)" alt="Photo">
                            <span class="whitespace-nowrap">${s.name || '-'}</span>
                        </div>
                    </td>
                    <td class="text-center px-1 py-2"><input type="number" id="web_h_${idx}" class="input-val mx-auto" value="${hVal}" onkeyup="updateData(${idx}, 'h', this.value); refreshBMI(${idx})" onchange="updateData(${idx}, 'h', this.value); refreshBMI(${idx})"></td>
                    <td class="text-center px-1 py-2"><input type="number" id="web_w_${idx}" class="input-val mx-auto" value="${wVal}" onkeyup="updateData(${idx}, 'w', this.value); refreshBMI(${idx})" onchange="updateData(${idx}, 'w', this.value); refreshBMI(${idx})"></td>
                    
                    <td class="text-center font-bold text-gray-700 text-[15px]" id="bmi_val_${idx}">${bmiData.val !== '-' ? bmiData.val : '-'}</td>
                    <td class="text-center"><span id="bmi_status_${idx}" class="px-3 py-1.5 rounded-md text-[12px] font-bold ${bmiData.color} whitespace-nowrap shadow-sm inline-block min-w-[75px]">${bmiData.text}</span></td>
                    
                    <td class="text-center px-1"><input type="text" id="web_n_${idx}" class="input-text" value="${nVal}" onchange="updateData(${idx}, 'n', this.value)"></td>
                </tr>`;
            });
            tbodyHTML += '</tbody>';
            const table = document.createElement('table');
            table.className = 'data-table';
            table.innerHTML = headerHTML + tbodyHTML;
            wrapper.appendChild(table);
            return wrapper;
        }

        // មុខងារថ្មី៖ ធ្វើបច្ចុប្បន្នភាព BMI និង Print Table ភ្លាមៗពេលចុចបញ្ជូល
        function refreshBMI(idx) {
            const h = document.getElementById(`web_h_${idx}`).value;
            const w = document.getElementById(`web_w_${idx}`).value;
            const bmiData = calcBMI(h, w);
            
            // Web UI
            const valEl = document.getElementById(`bmi_val_${idx}`);
            const statEl = document.getElementById(`bmi_status_${idx}`);
            if(valEl) valEl.innerText = bmiData.val;
            if(statEl) {
                statEl.innerText = bmiData.text;
                statEl.className = `px-3 py-1.5 rounded-md text-[12px] font-bold ${bmiData.color} whitespace-nowrap shadow-sm inline-block min-w-[75px]`;
            }
            
            // Print UI Update (Real-time synchronization)
            const printBmiEl = document.getElementById(`print_bmi_${idx}`);
            if(printBmiEl) {
                printBmiEl.innerHTML = bmiData.text !== '-' 
                    ? `<b>${toKhNum(bmiData.val)}</b><br><span style="font-size: 8px;">${bmiData.text}</span>` 
                    : '-';
            }

            // Update Dashboard
            updateStats();
        }

        // --- ផ្នែកបំបែកទំព័របោះពុម្ព ---
        function renderPrintPages() {
            const container = document.getElementById('print-pages-container');
            if (!container) return;
            container.innerHTML = '';

            const ROWS_FIRST_PAGE_SIG = 12;   
            const ROWS_OTHER_PAGE_SIG = 18;
            
            let pagesChunks = [];
            let tempStudents = [...students];

            if (tempStudents.length === 0) {
                pagesChunks.push([]);
            } else {
                let pageNum = 0;
                while (tempStudents.length > 0) {
                    let sigLimit = (pageNum === 0) ? ROWS_FIRST_PAGE_SIG : ROWS_OTHER_PAGE_SIG;
                    pagesChunks.push(tempStudents.splice(0, sigLimit));
                    pageNum++;
                }
            }

            pagesChunks.forEach((chunk, index) => {
                const isLast = (index === pagesChunks.length - 1);
                const isFirst = (index === 0);
                let startIdx = 0;
                for(let i=0; i<index; i++) startIdx += pagesChunks[i].length;
                container.innerHTML += generatePrintPageHTML(chunk, startIdx, isLast, isFirst);
            });
        }

            if (typeof momentkh !== 'undefined') {
                try { lunarStr = momentkh.format(momentkh.fromDate(today)).replace('ពុទ្ធសករាជ', 'ព.ស.'); } catch (e) {}

            let headerHtml = '';
            if (isFirstPage) {
                headerHtml = `

                        <h2 class="kh-moul text-base">ជាតិ សាសនា ព្រះមហាក្សត្រ</h2>
                        <div class="flex justify-center mt-2"><img src="https://lh3.googleusercontent.com/d/1BnGzoisjHxGRiMbsrP-rZ1F9zvSfdtAh" alt="divider" class="h-4" crossorigin="anonymous"></div>

                    </div>
                    <div class="text-center mb-6">
                        <h2 class="kh-moul text-xl text-blue-700">សៀវភៅតាមដានទម្ងន់ និងកម្ពស់សិស្ស</h2>

            }

            let tbodyHtml = chunk.map((s, i) => {
                const idx = startIdx + i;
                const hVal = healthData[`h_${idx}`] || '';
                const wVal = healthData[`w_${idx}`] || '';

            let sigHtml = '';
            if (isLastPage) {

                                        <div style="margin-bottom: 2px;">${lunarStr}</div>
                                        <div style="margin-bottom: 5px;">${solarDate}</div>
                                        <p class="kh-moul">គ្រូបន្ទុកថ្នាក់</p>
                                        <div class="sig-image-box">${classConfig.teacherSignature ? `<img src="${classConfig.teacherSignature}" style="transform: scale(${tScale})">` : ''}</div>
                                        <p class="teacher-name-final"style="margin-left: 3cm;">${classConfig.teacherName || ''}</p>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                `;
            }

            // សម្រួល Table Header សម្រាប់បោះពុម្ព
            return `<div class="page-a4 page-break">${headerHtml}
            <table class="print-table">
                <thead>
                    <tr>
                        <th style="width: 7%;">ល.រ</th>
                        <th style="width: 23%;">គោត្តនាម-នាម</th>
                        <th style="width: 8%;">ភេទ</th>
                        <th style="width: 14%;">ថ្ងៃកំណើត</th>
                        <th style="width: 10%;">កម្ពស់ (cm)</th>
                        <th style="width: 10%;">ទម្ងន់ (kg)</th>
                        <th style="width: 13%;">BMI</th>
                        <th style="width: 15%;">ផ្សេងៗ</th>
                    </tr>
                </thead>
                <tbody>${tbodyHtml}</tbody>${sigHtml}
            </table></div>`;
        }

        function updateData(idx, type, value) {
            healthData[`${type}_${idx}`] = value;
            // ភ្ជាប់ទិន្នន័យទៅ Print Table ភ្លាមៗ (កុំអោយខុសគ្នា)
            const printEl = document.getElementById(`print_${type}_${idx}`);
            if (printEl) printEl.value = value;
        }

        function updateMonthDisplay() {
            const val = document.getElementById('monthSelect').value;
            healthData['month_selected'] = val;
            document.querySelectorAll('.month-input-class').forEach(i => i.value = val);
            saveData(false); 
        }

        function showPhoto(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('photoModal').style.display = 'flex';
        }

        window.saveData = function(showToast = true) {
            localStorage.setItem('data_health_tracking', JSON.stringify(healthData));
            updateSignatures();
            if (showToast) {
                const msg = document.createElement('div');
                msg.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> <span>រក្សាទុកបានជោគជ័យ!</span>';
                msg.className = "fixed bottom-5 right-5 bg-emerald-500 text-white px-5 py-3 rounded-lg shadow-lg flex items-center gap-2 z-[100] font-bold transition-opacity duration-500";
                document.body.appendChild(msg);
                lucide.createIcons(); 
                setTimeout(() => { msg.style.opacity = '0'; setTimeout(() => msg.remove(), 500); }, 2000);
            }
        };

        async function downloadPDF() {
            const btn = document.getElementById('btnDownloadTop');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> កំពុងរៀបចំ...';
            btn.disabled = true;
            if (window.lucide) lucide.createIcons();

            const inputsToReplace = document.querySelectorAll('.print-only .pdf-input');
            const replacements = [];
            inputsToReplace.forEach(input => {
                const span = document.createElement('span');
                span.className = input.className;
                span.style.cssText = window.getComputedStyle(input).cssText;
                span.style.display = 'inline-block';
                span.innerText = input.value || '';
                input.style.display = 'none';
                input.parentNode.insertBefore(span, input);
                replacements.push({ span, input });
            });

            document.body.classList.add('pdf-exporting');
            await document.fonts.ready;
            await new Promise(r => setTimeout(r, 500)); 

            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
                const pages = document.querySelectorAll('.print-only .page-a4');
                for (let i = 0; i < pages.length; i++) {
                    const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true, backgroundColor: '#ffffff', windowWidth: 1024 });
                    if (i > 0) pdf.addPage();
                    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
                }
                pdf.save(`Healthy_Tracking_${classConfig.className || 'Class'}.pdf`);
            } catch (error) {
                console.error(error);
            } finally {
                document.body.classList.remove('pdf-exporting');
                replacements.forEach(({ span, input }) => { span.remove(); input.style.display = ''; });
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                if (window.lucide) lucide.createIcons();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
